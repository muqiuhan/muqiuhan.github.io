    <div class="post-content">
    <p>在 Wayland 上的 VSCode 中使用 <code>libdecor-gtk</code> 时，可能会遇到以下警告：</p>
<figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">libdecor-gtk-WARNING: Failed to initialize GTK</span><br></pre></td></tr></table></figure>
<p>这是因为 VSCode 默认使用 X11，可以使用以下参数启动 VSCode：</p>
<figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">code --enable-features=UseOzonePlatform --ozone-platform=wayland</span><br></pre></td></tr></table></figure>
